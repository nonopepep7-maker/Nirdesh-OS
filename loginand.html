<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirdesh os | Login</title>
    <link rel="icon" href="favicon.ico">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            background-color: #000;
            user-select: none;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        html::-webkit-scrollbar,
        body::-webkit-scrollbar {
            display: none;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
        }

        .screen {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            display: grid;
            place-items: center;
            position: relative;
            box-sizing: border-box;
        }

        .bg-wallpaper {
            background: linear-gradient(rgba(0, 0, 0, 0.1), rgba(0, 0, 0, 0.2)),
                url('https://picsum.photos/1920/1080') no-repeat center center/cover;
            background-attachment: fixed;
        }

        .lock-screen {
            color: white;
            text-shadow: 0 4px 12px rgba(0, 0, 0, .6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .time {
            font-size: 5.5rem;
            font-weight: 300;
            margin: 0;
            letter-spacing: -1px;
        }

        .date-display {
            font-size: 1.8rem;
            margin-top: 5px;
            font-weight: 400;
        }

        .scroll-hint {
            position: absolute;
            bottom: 40px;
            font-size: 1.1rem;
            opacity: 0.85;
            animation: bounce 2.5s infinite;
        }

        .login-box {
            width: min(380px, 90vw);
            padding: 32px;
            border-radius: 24px;
            background: rgba(20, 20, 25, .7);
            backdrop-filter: blur(18px);
            box-shadow: 0 25px 70px rgba(0, 0, 0, .5);
            text-align: center;
            color: white;
            transition: all 0.4s ease;
        }

       
    

        h1 {
            margin-bottom: 8px;
            font-size: 32px;
        }

        p {
            margin-bottom: 24px;
            color: #d4d4d8;
        }

        .pattern-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            width: 240px;
            margin: 0 auto 10px auto;
            touch-action: none;
        }

        .dot-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 40px;
            width: 40px;
            margin: auto;
        }
        .dot {
            width: 16px;
            height: 16px;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 50%;
            transition: background 0.2s, transform 0.2s;
            pointer-events: none;

        }
        .dot-wrapper.active .dot {
            background: #f59e0b;
            transform: scale(1.3);
            box-shadow: 0 0 12px #f59e0b;
        }
        .dot-wrapper.error-flash .dot {
            background: #fb7185;
            transform: scale(1.2);
            box-shadow: 0 0 12px #fb7185;
        }

        .error {
            min-height: 22px;
            margin-top: 14px;
            color: #fb7185;
            font-size: 14px;
        }
        

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-8px);
            }

            60% {
                transform: translateY(-4px);
            }
        }


            
    </style>
</head>

<body class="bg-wallpaper">

    <div class="screen lock-screen">
        <h1 class="time" id="clock">00:00</h1>
        <div class="date-display" id="date">Loading date...</div>
        <div class="scroll-hint">Scroll up to unlock</div>
    </div>

    <div class="screen">
        <div class="login-box">
        <p>Draw pattern to unlock</p>
        <div class="pattern-container" id="patternContainer">
            <div class="dot-wrapper" data-index="0"><div class="dot"></div></div>
            <div class="dot-wrapper" data-index="1"><div class="dot"></div></div>
            <div class="dot-wrapper" data-index="2"><div class="dot"></div></div>
            <div class="dot-wrapper" data-index="3"><div class="dot"></div></div>
            <div class="dot-wrapper" data-index="4"><div class="dot"></div></div>
            <div class="dot-wrapper" data-index="5"><div class="dot"></div></div>
            <div class="dot-wrapper" data-index="6"><div class="dot"></div></div>
            <div class="dot-wrapper" data-index="7"><div class="dot"></div></div>
            <div class="dot-wrapper" data-index="8"><div class="dot"></div></div>
        </div>
        <div class="error" id="errorMsg"></div>
    </div>
</div>





    <script>
        function updateClock() {
            const date = new Date();
            let hours = date.getHours();
            let minutes = date.getMinutes();
            minutes = minutes < 10 ? '0' + minutes : minutes;

            document.getElementById("clock").innerHTML = `${hours}:${minutes}`;

            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById("date").innerHTML = date.toLocaleDateString('en-US', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        const patternContainer = document.getElementById('patternContainer');
        const errorMsg = document.getElementById('errorMsg');

        let isDrawing = false;
        let sequence =[]
        let correctPattern = [0, 3, 6, 7, 8];

        function startDrawing(e) {
            isDrawing = true;
            sequence = [];
            errorMsg.textContent = '';
            document.querySelectorAll ('.dot-wrapper').forEach(el => el.classList.remove('active', 'error-flash'));
            handleMove(e);
        }

        function handleMove(e) {
            if (!isDrawing) return;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
             
            const target = document.elementFromPoint(clientX, clientY);
            if (target && target.classList.contains('dot-wrapper')) {
                const index = parseInt(target.dataset.index);
                if(!sequence.includes(index)) {
                    sequence.push(index);
                    target.classList.add('active');
                }
            }
        }
        function stopDrawing() {
            if (!isDrawing) return;
            isDrawing = false;
            if (sequence.length === 0) return;
            if (JSON.stringify(sequence) === JSON.stringify(correctPattern)) {
                window.location.href = 'home.html';

            } else {
                errorMsg.innerText = 'Incorrect pattern';
                document.querySelectorAll('.dot-wrapper.active').forEach(el => {
                    el.classList.remove('active');
                    el.classList.add('error-flash');
                });
            }
        }

        patternContainer.addEventListener('mousedown', startDrawing);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', stopDrawing);

        patternContainer.addEventListener('touchstart', startDrawing, { passive: false });
        window.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', stopDrawing);
    </script>
</body>

</html>
